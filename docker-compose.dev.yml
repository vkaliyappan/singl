services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3000"
    volumes:
      - db_data:/data
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      DATABASE_URL: file:/data/local.db
      TWX_BASE_URL: ${TWX_BASE_URL:-}
      TWX_APP_KEY: ${TWX_APP_KEY:-}
    restart: unless-stopped

volumes:
  db_data:
